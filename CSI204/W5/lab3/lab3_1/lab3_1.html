<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 3.1 - Home Loan Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8 font-sans">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded shadow">
        <h1 class="text-2xl font-bold mb-4 text-blue-600">คำนวณสินเชื่อบ้าน</h1>
        <form id="homeLoanForm" class="space-y-4">
            <div>
                <label class="block text-gray-700">เงินเดือน (บาท):</label>
                <input type="text" id="salary" class="w-full border p-2 rounded" required>
            </div>
            <div>
                <label class="block text-gray-700">จำนวนเงินกู้ (บาท):</label>
                <input type="text" id="loanAmount" class="w-full border p-2 rounded" required>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-gray-700">อัตราดอกเบี้ย (% ต่อปี):</label>
                    <input type="number" step="0.01" id="interestRate" class="w-full border p-2 rounded" value="5" required>
                </div>
                <div>
                    <label class="block text-gray-700">ระยะเวลา (ปี):</label>
                    <input type="number" id="years" class="w-full border p-2 rounded" value="30" required>
                </div>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700">คำนวณ</button>
        </form>

        <div id="result" class="mt-6 bg-blue-50 p-4 rounded hidden">
            </div>
    </div>
    <script src="lab3_1.js"></script>
</body>
</html>
