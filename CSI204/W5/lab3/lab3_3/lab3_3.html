<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 3.3 - Electric Bill</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8 font-sans">
    <div class="max-w-md mx-auto bg-white p-6 rounded shadow">
        <h1 class="text-2xl font-bold mb-4 text-yellow-600">คำนวณค่าไฟบ้าน</h1>
        <form id="electricForm" class="space-y-4">
            <div>
                <label class="block">เลขหน้าปัดเดือนก่อน:</label>
                <input type="text" id="prevUnit" class="w-full border p-2 rounded" required>
            </div>
            <div>
                <label class="block">เลขหน้าปัดเดือนปัจจุบัน:</label>
                <input type="text" id="currUnit" class="w-full border p-2 rounded" required>
            </div>
            <button type="submit" class="w-full bg-yellow-500 text-white font-bold py-2 rounded hover:bg-yellow-600">คำนวณค่าไฟ</button>
        </form>

        <div id="billResult" class="mt-6 bg-yellow-50 p-4 rounded hidden"></div>
    </div>
    <script src="lab3_3.js"></script>
</body>
</html>
