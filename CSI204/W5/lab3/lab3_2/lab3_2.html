<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 3.2 - Car Loan Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8 font-sans">
    <div class="max-w-3xl mx-auto bg-white p-6 rounded shadow">
        <h1 class="text-2xl font-bold mb-4 text-green-600">คำนวณสินเชื่อรถยนต์</h1>
        <form id="carLoanForm" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block">ราคารถ:</label>
                    <input type="text" id="carPrice" class="w-full border p-2 rounded" required>
                </div>
                <div>
                    <label class="block">เงินดาวน์:</label>
                    <input type="text" id="downPayment" class="w-full border p-2 rounded" required>
                </div>
                <div>
                    <label class="block">ดอกเบี้ย (% ต่อปี 2-5%):</label>
                    <input type="number" step="0.01" id="carInterest" class="w-full border p-2 rounded" value="3" required>
                </div>
                <div>
                    <label class="block">ระยะเวลา (เดือน):</label>
                    <input type="number" id="carMonths" class="w-full border p-2 rounded" value="48" required>
                </div>
            </div>
            <button type="submit" class="w-full bg-green-600 text-white py-2 rounded font-bold hover:bg-green-700">คำนวณค่างวด</button>
        </form>

        <div id="tableContainer" class="mt-6 hidden overflow-x-auto"></div>
    </div>
    <script src="lab3_2.js"></script>
</body>
</html>
