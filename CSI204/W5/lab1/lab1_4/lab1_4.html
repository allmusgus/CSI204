<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 1.4 - Form Validation</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8 font-sans">
    <div class="max-w-md mx-auto bg-white p-6 rounded shadow">
        <h1 class="text-2xl font-bold mb-4 text-blue-600">สมัครสมาชิก</h1>
        
        <form id="registerForm" class="space-y-4">
            <div>
                <label for="name" class="block text-gray-700">ชื่อ:</label>
                <input type="text" id="name" class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            <div>
                <label for="email" class="block text-gray-700">อีเมล:</label>
                <input type="text" id="email" class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            <div>
                <label for="phone" class="block text-gray-700">เบอร์โทร (10 หลัก):</label>
                <input type="text" id="phone" class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            <div>
                <label for="password" class="block text-gray-700">รหัสผ่าน (ขั้นต่ำ 6 ตัว):</label>
                <input type="password" id="password" class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700">
                ลงทะเบียน
            </button>
        </form>
    </div>

    <script src="lab1_4.js"></script>
</body>
</html>
