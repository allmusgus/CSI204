<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 1.5 - LocalStorage Management</title>
    <style>
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { padding: 8px; width: 250px; }
        button { padding: 8px 15px; margin-right: 5px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h1>ระบบบันทึกข้อมูลผู้ใช้งาน (LocalStorage)</h1>
    <form id="storageForm">
        <div class="form-group">
            <label for="name">ชื่อ:</label>
            <input type="text" id="name" required>
        </div>
        <div class="form-group">
            <label for="email">อีเมล:</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label for="phone">เบอร์โทร:</label>
            <input type="text" id="phone" required>
        </div>
        <div class="form-group">
            <label for="password">รหัสผ่าน:</label>
            <input type="password" id="password" required>
        </div>
        <button type="submit" style="background-color: green; color: white;">บันทึกข้อมูล</button>
        <button type="button" id="clearBtn" style="background-color: red; color: white;">ล้างข้อมูลทั้งหมด</button>
    </form>

    <h2>รายชื่อผู้ใช้ที่ลงทะเบียน</h2>
    <div id="userList"></div>

    <script src="lab1_5.js"></script>
</body>
</html>
