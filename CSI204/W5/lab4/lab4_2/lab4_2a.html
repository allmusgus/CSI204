<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Lab 4.2a - SessionStorage Cart</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8 font-sans">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded shadow">
        <h1 class="text-2xl font-bold mb-4 text-purple-600">สินค้าน่าสนใจ (SessionStorage)</h1>
        
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="border p-4 rounded text-center">
                <h2 class="font-bold">Keyboard</h2>
                <p>ราคา: 1,500 บาท</p>
                <button onclick="addToCart('Keyboard', 1500)" class="mt-2 bg-purple-500 text-white px-4 py-1 rounded">หยิบลงตะกร้า</button>
            </div>
            <div class="border p-4 rounded text-center">
                <h2 class="font-bold">Mouse</h2>
                <p>ราคา: 800 บาท</p>
                <button onclick="addToCart('Mouse', 800)" class="mt-2 bg-purple-500 text-white px-4 py-1 rounded">หยิบลงตะกร้า</button>
            </div>
        </div>

        <a href="lab4_2b.html" class="block text-center bg-gray-800 text-white font-bold py-2 rounded">ดูตะกร้าสินค้าของคุณ</a>
    </div>
    <script src="lab4_2a.js"></script>

</html>
