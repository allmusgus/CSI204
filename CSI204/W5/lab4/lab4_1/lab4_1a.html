<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Lab 4.1a - Form LocalStorage</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8 font-sans">
    <div class="max-w-md mx-auto bg-white p-6 rounded shadow">
        <h1 class="text-xl font-bold mb-4 text-indigo-600">ตั้งค่าโปรไฟล์ (LocalStorage)</h1>
        <form id="profileForm" class="space-y-4">
            <div><label>ชื่อ:</label><input type="text" id="pName" class="w-full border p-2 rounded" required></div>
            <div><label>อีเมล:</label><input type="email" id="pEmail" class="w-full border p-2 rounded" required></div>
            <div><label>เบอร์โทร:</label><input type="text" id="pPhone" class="w-full border p-2 rounded" required></div>
            <div>
                <label>Theme เริ่มต้น:</label>
                <select id="pTheme" class="w-full border p-2 rounded">
                    <option value="light">Light Mode</option>
                    <option value="dark">Dark Mode</option>
                </select>
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-2 rounded">บันทึก & ไปหน้าแสดงผล</button>
        </form>
    </div>
    <script src="lab4_1a.js"></script>
</body>
</html>
